<!DOCTYPE html>
<html>
<head>
    <title>My Online Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .header <div class="nav" style="background-color: #444; padding: 10px; text-align: center;">
    <a href="index.html" style="color: white; text-decoration: none; margin: 0 15px;">Home</a>
    <a href="about.html" style="color: white; text-decoration: none; margin: 0 15px;">About</a>
    <a href="products.html" style="color: white; text-decoration: none; margin: 0 15px;">Products</a>
    <a href="contact.html" style="color: white; text-decoration: none; margin: 0 15px;">Contact</a>
</div> {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .product-card {
            background-color: white;
            border: 1px solid #ddd;
            padding: 20px;
            width: 250px;
            text-align: center;
            border-radius: 5px;
        }
        .product-card img {
            width: 200px;
            height: 200px;
            object-fit: cover;
        }
        .price {
            color: green;
            font-size: 24px;
            font-weight: bold;
        }
        .buy-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
        }
        .buy-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to My Store</h1>
        <p>Your one-stop shop for amazing products</p>
    </div>

    <div class="products">
        <!-- Product 1 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Product 1">
            <h3>Product Name 1</h3>
            <p class="price">$29.99</p>
            <p>Great product description here</p>
            <button class="buy-btn" onclick="alert('Thank you for buying!')">Buy Now</button>
        </div>

        <!-- Product 2 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Product 2">
            <h3>Product Name 2</h3>
            <p class="price">$39.99</p>
            <p>Another amazing product</p>
            <button class="buy-btn" onclick="alert('Thank you for buying!')">Buy Now</button>
        </div>

        <!-- Product 3 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Product 3">
            <h3>Product Name 3</h3>
            <p class="price">$49.99</p>
            <p>Our best seller!</p>
            <button class="buy-btn" onclick="alert('Thank you for buying!')">Buy Now</button>
        </div>
    </div>

    <div style="text-align: center; margin-top: 50px; padding: 20px; background-color: #333; color: white;">
        <h2>About Us</h2>
        <p>We sell quality products with love and care!</p>
        <p>Contact: your-email@gmail.com</p>
    </div>
</body>
</html>
